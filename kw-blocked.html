<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stofus</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="kw-blocked.css">
</head>
<body>
  <div class="panel">
    <div class="brand">STOFUS</div>
    <div class="subtitle">Protected content detected</div>
    <div class="keyword-block">
      Blocked keyword: <span id="matchedKeyword"></span>
    </div>
    <div class="info">This page contains content associated with a keyword you chose to block.</div>
    <div class="action-row">
      <button id="goBackBtn" class="btn">[GO BACK]</button>
      <button id="closeBtn" class="btn">[CLOSE TAB]</button>
    </div>
  </div>

  <button id="unintentionalBtn" class="btn-bypass">Unintentional?</button>

  <div id="confirmPopup" class="confirm-popup" style="display: none;">
    <div class="confirm-popup-content">
      <p id="confirmMessage">Did &ldquo;<span id="blockedKeyword"></span>&rdquo; come up on this page accidentally?</p>
      <div class="confirm-buttons">
        <button id="confirmYep" class="btn">[Yes]</button>
        <button id="confirmNah" class="btn">[No]</button>
      </div>
    </div>
  </div>

  <script src="kw-blocked.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stofus</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="panel">
    <div class="brand">STOFUS</div>

    <div id="blockedState">
      <div class="subtitle">Protection active</div>
      <div class="timer" id="countdown">--:--</div>
      <div class="info">This page will become available automatically.</div>
      <button id="closeBtn" class="btn">[CLOSE TAB]</button>
    </div>

    <div id="unblockedState" style="display: none;">
      <div class="subtitle">Protection complete</div>
      <div class="info" style="margin-bottom: 32px;">You may continue.</div>
      <button id="reloadBtn" class="btn">[RELOAD PAGE]</button>
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
